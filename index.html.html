{day:2,icon:"🚫",title:"客服回覆紅線規則",titleEn:"Day 2: CS Reply Red Lines",
intro:"今天的目標：記住哪些話絕對不能說。這不是建議，是底線。",
content:`📌 四大紅線類別

🔴 合規紅線
• 不做收益承諾：不說「保證收益」「穩賺」「零風險」「保本」
• 不做交易建議：不說「建議買入/賣出」「現在是好時機」
• 不做行情評價：不預測價格走勢

🔴 品牌紅線
• 不比較競品，不提對手名字
• 不說「規劃中」「即將推出」「敬請期待」
• 不說「中心化引擎」「去中心化交易所」「非託管」「Web2」「Web2.5」
• 不主動提及特定國家

🔴 營銷紅線
• 不推薦具體幣種或交易對
• 不用促銷語言：不說「秒到」「零成本」「免費」，用事實陳述
• 不替用戶做交易決策

🔴 隱私紅線
• 不在公開渠道討論用戶資金明細
• 不私信用戶、不暴露其他用戶信息
• ⚠️ 可以在 Claude 中輸入用戶 UID，但絕不能貼證件照片或證件號碼

📌 態度原則
❌ 不說「不好意思」「抱歉」
✅ 說「感謝您的反饋/參與」
• 功能暫不支持 → 感謝反饋，不道歉
• 用戶指出問題 → 感謝寶貴意見，不辯解

📌 今日測試：找出以下 5 句的所有紅線違規

① 「BTC 流動性比較好，建議您可以從這個幣對開始交易。」
② 「不好意思讓您久等了，這個功能我們規劃中，敬請期待！」
③ 「我們比 XX 交易所手續費更低，而且提幣秒到。」
④ 「根據目前行情，BTC 短期應該會繼續漲，您可以考慮加倉。」
⑤ 「您的帳戶餘額是 5,230 USDT，上次出金 2,000 USDT 到 0x3f...a8。」`,
checks:[
"① 推薦幣種 + 做交易建議",

"③ 比較競品 + 促銷語言「秒到」",
"④ 行情評價 + 交易建議",

{day:3,icon:"💡",title:"服務意識五條原則",titleEn:"Day 3: 5 Service Principles",
intro:"回覆 ≠ 服務。回覆是給答案，服務是讓用戶感受到你在幫他解決問題。",
content:`📌 五條原則

1️⃣ 先查再回：花 1 分鐘查後台（manage / back office），帶著事實回覆
2️⃣ 回答用戶問的問題：問多久就給時間預期，問為什麼就給原因。「請耐心等候」不是回答
3️⃣ 能做的先做了：能查到的直接查，能先處理的先處理
4️⃣ 做了什麼告訴用戶：你查了兩個系統核對了地址，多說一句
5️⃣ 知道答案就直接說：不是每個問題都需要走模板

📌 最終檢查：這條消息發出去，用戶還需要再來問一次嗎？

📌 三個真實 Case

Case 1：用戶問「大概多久」
❌ 原回覆：請耐心等候。謝謝！
✅ 正確：查後台 →「已在處理，通常 2 小時內完成。超過了跟我們說」

Case 2：幫用戶核實 UID
❌ 原回覆：經核實，您的 UID 為 169502805。
✅ 正確：「我們查了後台註冊信息和錢包地址，確認一致。您的 UID 是 169502805」

Case 3：手機端劃轉失敗
❌ 原回覆：發了信息收集模板，要求發郵件
✅ 正確：「目前手機端暫不支持劃轉到合約賬戶，可先用 PC 端。感謝反饋」

📌 今日任務：改寫以下兩條回覆

Case A（TG）用戶：「我充值 USDT 已經一小時了還沒到帳，怎麼回事？」
原回覆：「您好，充值到賬時間取決於網絡確認速度，請耐心等候。如有問題請發郵件至 support@mcmarkets.com。」

Case B（郵件）用戶：「請問你們支持 API 交易嗎？」
原回覆：「感謝您的來信。關於您提到的 API 交易功能，目前我們正在規劃中，敬請期待！」`,

"Case A：先查了後台（原則 1）",

{day:4,icon:"💬",title:"六種場景回覆框架",titleEn:"Day 4: 6 Reply Scenario Frameworks",
intro:"掌握六種框架，90% 的客服場景都能覆蓋。",
content:`📌 六種場景

場景 1：你知道答案 → 直接回答 + 用戶接下來怎麼做
場景 2：需要查了才能答 → 你查了什麼 + 當前狀態 + 預計時間
場景 3：你解決不了 → 你做了什麼 + 轉給了誰 + 用戶等多久
場景 4：用戶有情緒 → 感謝反饋 + 你做了什麼 + 接下來怎麼處理
場景 5：用戶不確定怎麼做 → 先問情況 → 再引導
場景 6：功能暫不支持 → 據實告知 + 不承諾時間線 + 感謝反饋

📌 渠道差異
TG 群：講人話、2-3 句、不需要模板格式
郵件：正式但不官腔、可以稍長、結構完整
核心一樣：解決問題

📌 今日任務：判斷場景 + 寫 TG 回覆

Q1：「你們手續費是多少？」
Q2：「我提幣兩天了還沒到，什麼情況？」
Q3：「你們平台是不是有 Bug？我下單明明成功了，持倉裡看不到！」
Q4：「你們有 API 嗎？我想做量化交易。」`,

"Q1 = 場景 1，直接回答手續費 + 在哪查",
"Q2 = 場景 2，查了什麼 + 狀態 + 時間預期",
"Q3 = 場景 4，先感謝反饋不辯解，然後處理",
"Q4 = 場景 6，據實告知不說「規劃中」",

/* ═══ Config ═══ */
const START_DATE = "2026-03-26"; // ← 改這裡設定第一天的日期（目前設成今天方便預覽，上線前改成實際開始日期）
const dayColors = ["#555","#c23","#d88c1a","#c05a30","#c05a30","#1868b7","#2e7d8a","#8a6b1e","#6b4e9e","#d44638","#2e7d8a","#1a6b4e","#d88c1a","#b33"];

function getDayIndex(){
  const start = new Date(START_DATE);
  start.setHours(0,0,0,0);
  const now = new Date();
  now.setHours(0,0,0,0);
  return Math.floor((now - start) / 86400000);
}

function isUnlocked(dayNum, previewMode){
  if(previewMode) return true;
  return getDayIndex() >= dayNum - 1;
}

/* ═══ Download completion record ═══ */
function downloadRecord(name, dayData, checks, st){
  const now = new Date();
  const ts = now.toISOString();
  const dateStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`;

  const completed = checks.map((c,i)=>({item:c, done:!!st[`d${dayData.day}-${i}`]}));
  const doneCount = completed.filter(c=>c.done).length;
  const allDone = doneCount === checks.length;

  let txt = `════════════════════════════════════════\n`;
  txt += `  MC Markets AI Lab — 每日學習完成紀錄\n`;
  txt += `════════════════════════════════════════\n\n`;
  txt += `姓名：${name}\n`;
  txt += `日期：${dateStr}\n`;
  txt += `時間：${now.toLocaleTimeString('zh-TW')}\n`;
  txt += `課程：Day ${dayData.day} — ${dayData.title}\n`;
  txt += `狀態：${allDone ? '✅ 全部完成' : `⬜ 進行中 (${doneCount}/${checks.length})`}\n\n`;
  txt += `────────────────────────────────────────\n`;
  txt += `完成項目：\n`;
  txt += `────────────────────────────────────────\n`;
  completed.forEach((c,i)=>{
    txt += `${c.done ? '✅' : '⬜'} ${c.item}\n`;
  });
  txt += `\n────────────────────────────────────────\n`;
  txt += `完成比例：${doneCount}/${checks.length} (${Math.round(doneCount/checks.length*100)}%)\n`;
  txt += `下載時間：${ts}\n`;
  txt += `════════════════════════════════════════\n`;

  const blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `MCM-Day${dayData.day}-${name}-${dateStr}.txt`;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ═══ Components ═══ */
function NameModal({onSet}){
  const [n,setN]=useState('');
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:340,textAlign:"center"}} className="fade-in">
        <div style={{fontSize:11,fontWeight:700,color:"#c05a30",letterSpacing:"0.1em",marginBottom:4}}>MC MARKETS AI LAB</div>
        <h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>14 天 Claude 實戰訓練</h1>
        <p style={{fontSize:12,color:"#888",marginBottom:24}}>每天解鎖一個課程，完成後下載紀錄</p>
        <input value={n} onChange={e=>setN(e.target.value)} onKeyDown={e=>e.key==='Enter'&&n.trim()&&onSet(n.trim())}
          placeholder="輸入你的名字" autoFocus
          style={{width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid rgba(0,0,0,0.12)",fontSize:14,marginBottom:10,outline:"none"}}/>
        <button onClick={()=>n.trim()&&onSet(n.trim())} disabled={!n.trim()}
          style={{width:"100%",padding:"10px",borderRadius:8,border:"none",background:"#1a1a1a",color:"white",fontSize:14,fontWeight:600,cursor:"pointer",opacity:n.trim()?1:0.4}}>
          開始訓練
        </button>
      </div>
    </div>
  );
}

function App(){
  const [name,setName]=useState(()=>localStorage.getItem('mcm14d-name')||'');
  const [st,setSt]=useState(()=>name?load(name):{});
  const [openDay,setOpenDay]=useState(null);
  const [preview,setPreview]=useState(false);
  const clickRef=useRef(0);
  const clickTimer=useRef(null);

  // 連點標題 5 次 → 切換預覽模式（只有你知道）
  const handleTitleClick=()=>{
    clickRef.current++;
    clearTimeout(clickTimer.current);
    clickTimer.current=setTimeout(()=>{clickRef.current=0},1500);
    if(clickRef.current>=5){setPreview(p=>!p);clickRef.current=0;}
  };

  // 名字變更時載入該用戶的進度
  useEffect(()=>{if(name)setSt(load(name))},[name]);
  // 進度變更時存檔（綁名字）
  useEffect(()=>{if(name)save(name,st)},[st]);
  useEffect(()=>{
    const idx = getDayIndex();
    if(idx>=0 && idx<14) setOpenDay(idx+1);
    else if(idx>=14) setOpenDay(14);
    else setOpenDay(1);
  },[]);

  const setNameAndSave=(n)=>{setName(n);localStorage.setItem('mcm14d-name',n);setSt(load(n));};
  const chk=(k)=>setSt(p=>({...p,[k]:!p[k]}));
  const dayDone=(d)=>d.checks.every((_,i)=>st[`d${d.day}-${i}`]);
  const totalDone=days.filter(d=>dayDone(d)).length;

  if(!name) return <NameModal onSet={setNameAndSave}/>;

  const curDay = openDay ? days.find(d=>d.day===openDay) : null;

  return(
  <div style={{maxWidth:700,margin:"0 auto",padding:"24px 14px 80px"}}>
    {/* Preview mode banner */}
    {preview&&<div style={{padding:"8px 12px",borderRadius:8,background:"rgba(24,104,183,0.08)",border:"1px solid rgba(24,104,183,0.2)",marginBottom:12,fontSize:11,color:"#1868b7",fontWeight:600,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      🔓 預覽模式：全部 14 天已解鎖（再點標題 5 次關閉）
      <button onClick={()=>setPreview(false)} style={{background:"none",border:"1px solid rgba(24,104,183,0.3)",borderRadius:4,padding:"2px 8px",fontSize:10,color:"#1868b7",cursor:"pointer"}}>關閉預覽</button>
    </div>}

    {/* Header */}
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
      <div style={{flex:1,cursor:"default",userSelect:"none"}} onClick={handleTitleClick}>
        <div style={{fontSize:11,fontWeight:700,color:"#c05a30",letterSpacing:"0.1em"}}>MC MARKETS AI LAB</div>
        <h1 style={{fontSize:20,fontWeight:700,margin:"2px 0"}}>14 天 Claude 實戰訓練</h1>
      </div>
      <div style={{textAlign:"right"}}>
        <div style={{fontSize:12,fontWeight:600}}>{name}</div>
        <button onClick={()=>{setName('');setSt({});localStorage.removeItem('mcm14d-name')}} style={{fontSize:10,color:"#aaa",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>換人</button>
      </div>
    </div>

    {/* Overall progress */}
    <div style={{padding:"12px 14px",borderRadius:10,background:"rgba(0,0,0,0.02)",marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
      <div style={{fontSize:28,fontWeight:700,color:totalDone===14?"#3a7d68":"#c05a30"}}>{totalDone}<span style={{fontSize:13,color:"#aaa"}}>/14</span></div>
      <div style={{flex:1}}>
        <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>
          {totalDone===14?"🎉 全部完成！恭喜！":totalDone===0?"開始你的第一天訓練吧":` 已完成 ${totalDone} 天`}
        </div>
        <div style={{display:"flex",gap:3}}>
          {days.map(d=>(
            <div key={d.day} style={{flex:1,height:6,borderRadius:3,background:dayDone(d)?"#3a7d68":isUnlocked(d.day,preview)?"rgba(192,90,48,0.2)":"rgba(0,0,0,0.06)"}}/>
          ))}
        </div>
      </div>
    </div>

    {/* Day cards */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5,marginBottom:20}}>
      {days.map(d=>{
        const unlocked = isUnlocked(d.day,preview);
        const done = dayDone(d);
        const active = openDay===d.day;
        return(
          <button key={d.day} onClick={()=>unlocked&&setOpenDay(d.day)}
            style={{padding:"8px 4px",borderRadius:8,border:active?`2px solid ${dayColors[d.day-1]}`:"1px solid rgba(0,0,0,0.06)",
              background:done?"rgba(58,125,104,0.06)":active?`${dayColors[d.day-1]}08`:"white",
              cursor:unlocked?"pointer":"default",opacity:unlocked?1:0.35,textAlign:"center",transition:"all 0.15s"}}>
            <div style={{fontSize:16}}>{unlocked?d.icon:"🔒"}</div>
            <div style={{fontSize:10,fontWeight:700,color:done?"#3a7d68":"#666"}}>Day {d.day}</div>
            {done&&<div style={{fontSize:8,color:"#3a7d68"}}>✅</div>}
          </button>
        );
      })}
    </div>

    {/* Active day content */}
    {curDay && isUnlocked(curDay.day,preview) && (
      <div className="fade-in" style={{borderRadius:12,border:`1.5px solid ${dayColors[curDay.day-1]}25`,overflow:"hidden"}}>
        {/* Day header */}
        <div style={{padding:"16px 18px",background:`${dayColors[curDay.day-1]}08`}}>
          <div style={{fontSize:11,fontWeight:700,color:dayColors[curDay.day-1],letterSpacing:"0.06em"}}>DAY {curDay.day} OF 14</div>
          <div style={{fontSize:18,fontWeight:700,marginTop:2}}>{curDay.icon} {curDay.title}</div>
          <div style={{fontSize:11,color:"#999"}}>{curDay.titleEn}</div>
          <div style={{fontSize:12.5,color:"#555",marginTop:8,padding:"8px 10px",background:"rgba(255,255,255,0.6)",borderRadius:6}}>{curDay.intro}</div>
        </div>

        {/* Content */}
        <div style={{padding:"16px 18px"}}>
          <div style={{fontSize:12.5,color:"#333",lineHeight:1.9,whiteSpace:"pre-wrap",background:"rgba(0,0,0,0.015)",padding:"12px 14px",borderRadius:8,marginBottom:16}}>{curDay.content}</div>

          {/* Checklist */}
          <div style={{fontSize:11,fontWeight:700,color:"#888",marginBottom:8,letterSpacing:"0.04em"}}>☑️ 今日完成標準</div>
          {curDay.checks.map((item,i)=>{
            const k=`d${curDay.day}-${i}`;
            const dn=st[k];
            return(
              <label key={i} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"5px 0",cursor:"pointer",fontSize:12.5,color:dn?"#999":"#333"}}>
                <input type="checkbox" checked={!!dn} onChange={()=>chk(k)}
                  style={{marginTop:2.5,accentColor:"#3a7d68",width:16,height:16,cursor:"pointer"}}/>
                <span style={{textDecoration:dn?"line-through":"none"}}>{item}</span>
              </label>
            );
          })}

          {/* Status + Download */}
          <div style={{marginTop:16,padding:"12px 14px",borderRadius:8,
            background:dayDone(curDay)?"rgba(58,125,104,0.06)":"rgba(0,0,0,0.02)",
            border:`1px solid ${dayDone(curDay)?"rgba(58,125,104,0.2)":"rgba(0,0,0,0.06)"}`}}>

            {dayDone(curDay) ? (
              <div>
                <div style={{fontSize:14,fontWeight:700,color:"#3a7d68",marginBottom:8}}>
                  ✅ Day {curDay.day} 完成！
                </div>
                <button onClick={()=>downloadRecord(name,curDay,curDay.checks,st)}
                  style={{width:"100%",padding:"10px",borderRadius:8,border:"none",background:"#3a7d68",color:"white",fontSize:13,fontWeight:600,cursor:"pointer"}}>
                  📥 下載今日完成紀錄
                </button>
                <div style={{fontSize:10.5,color:"#888",marginTop:6,textAlign:"center"}}>
                  下載後把檔案交給主管做登記
                </div>
              </div>
            ) : (
              <div style={{fontSize:12,color:"#888"}}>
                完成上面所有項目後，就可以下載今日完成紀錄 📥
              </div>
            )}
          </div>
        </div>
      </div>
    )}

    {/* Footer */}
    <div style={{marginTop:24,padding:"10px 12px",borderRadius:8,background:"rgba(220,50,50,0.03)",border:"1px solid rgba(220,50,50,0.07)",fontSize:10.5,color:"#888",lineHeight:1.7}}>
      <span style={{fontWeight:700,color:"#b33"}}>⚠️ 隱私紅線：</span> ✅ 可輸入 UID　🚫 不能貼證件照片/號碼　📌 所有對外內容須主管審核
    </div>

    {/* Help banner */}
    <div style={{marginTop:8,padding:"14px 16px",borderRadius:10,background:"linear-gradient(135deg, rgba(24,104,183,0.06), rgba(58,125,104,0.06))",border:"1px solid rgba(24,104,183,0.12)",display:"flex",alignItems:"center",gap:12}}>
      <div style={{fontSize:28,lineHeight:1}}>💬</div>
      <div>
        <div style={{fontSize:13,fontWeight:700,color:"#1a1a1a"}}>遇到問題？需要幫助？</div>
        <div style={{fontSize:12,color:"#555",marginTop:2}}>操作上有任何不理解或使用困難，請直接找 <span style={{fontWeight:700,color:"#1868b7"}}>Wilson</span> 協助，不要卡著不問！</div>
        <div style={{fontSize:10.5,color:"#999",marginTop:2}}>If you have any questions or need help, please reach out to <b>Wilson</b> directly.</div>
      </div>
    </div>
  </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
