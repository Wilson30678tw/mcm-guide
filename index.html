{id:2,icon:"⌨️",title:{zh:"Claude Code 基本操作",en:"Claude Code: How to Use"},intro:{zh:"Code 比 Chat 更強大——你給目標，它規劃、執行、產出文件。這個 Module 教你怎麼操作。",en:"Code is more powerful than Chat — give it a goal, it plans, executes, and outputs. This module teaches the basics."},
content:{zh:"📌 啟動\n\n打開終端（Mac: Terminal / Windows: PowerShell），輸入：\nclaude\n\n📌 基本操作\n\n1️⃣ 給指令 — 直接用中文或英文描述你想做什麼：\n> 幫我寫一份客服回覆範本，KYC 和出金延遲，TG+Email，中英雙語\n\nClaude 會規劃並逐步執行。\n\n2️⃣ 看它執行 — 它會顯示每一步在做什麼，等它做完就好。\n\n3️⃣ 中途介入\n• 停下來：說「停」或按 Ctrl+C\n• 改方向：「等一下，改成只要 TG 版」\n• 追加：「再加一個出金延遲的場景」\n\n4️⃣ 產出文件 — 它可以直接在電腦上建文件：\n> 產出一份 Markdown，存到桌面\n\n5️⃣ /kickoff — 引導式流程：需求澄清 → 方案設計 → 執行計劃 → 執行\n\n📌 Chat vs Code\n\nChat（claude.ai 網頁）：\n• 你問 → 回答 → 再問 → 再答（5-6 輪）\n• 適合：快速問答、討論、改寫文字\n\nCode（終端）：\n• 你給大目標 → 自己規劃+執行+產出文件\n• 適合：批量範本、生成文件、複雜任務一次完成\n\n📌 任務\n\n任務 A：給一個簡單指令\n> 幫我用中英雙語寫一段 MC Markets 歡迎訊息，TG 群用，3 句以內\n\n任務 B：讓它產出文件\n> 寫一份密碼重設 FAQ，3 個 Q&A，中英雙語，存成 Markdown 到桌面\n確認桌面出現了文件。\n\n任務 C：試 /kickoff\n輸入 /kickoff，跟著走一輪（主題隨便選）。不用做完，體驗流程。",en:"📌 Launch\n\nOpen terminal (Mac: Terminal / Windows: PowerShell), type:\nclaude\n\n📌 Basics\n\n1️⃣ Give instructions — describe what you want:\n> Write a CS reply template for KYC and withdrawal delay, TG+Email, bilingual\n\nClaude plans and executes step by step.\n\n2️⃣ Watch it work — it shows each step. Just wait.\n\n3️⃣ Intervene\n• Stop: say \"stop\" or Ctrl+C\n• Redirect: \"Wait, just TG version\"\n• Add more: \"Add a withdrawal delay scenario\"\n\n4️⃣ Output files — creates files on your computer:\n> Create a Markdown file, save to desktop\n\n5️⃣ /kickoff — guided flow: Requirements → Design → Plan → Execute\n\n📌 Chat vs Code\n\nChat (claude.ai):\n• Ask → answer → ask → answer (5-6 rounds)\n• Good for: quick Q&A, discussion, rewriting\n\nCode (terminal):\n• Give big goal → plans + executes + outputs files\n• Good for: batch templates, file generation, complex tasks in one shot\n\n📌 Tasks\n\nTask A: Simple instruction\n> Write a bilingual welcome message for MC Markets TG group, 3 sentences max\n\nTask B: Output a file\n> Write a password reset FAQ, 3 Q&As, bilingual, save as Markdown to desktop\nVerify the file exists.\n\nTask C: Try /kickoff\nType /kickoff, follow the flow (any topic). Don't need to finish — just experience it."},
checks:{zh:["成功在終端輸入 claude 進入 Claude Code","任務 A：給了指令，Claude 產出了結果","任務 B：Claude 產出了文件到電腦上（能找到）","任務 C：輸入了 /kickoff 並體驗了引導流程","能說出 Chat 和 Code 的差別"],en:["Entered Claude Code via terminal","Task A: Gave instruction, got result","Task B: Claude created a file on computer","Task C: Tried /kickoff guided flow","Can explain Chat vs Code difference"]}},

{id:3,icon:"🚫",title:{zh:"客服回覆紅線規則",en:"CS Reply Red Lines"},intro:{zh:"哪些話絕對不能說。底線，不是建議。",en:"What you must NEVER say. Hard limits."},
content:{zh:"📌 四大紅線\n\n🔴 合規：不做收益承諾（保證收益/穩賺/零風險/絕對安全/保本/盡量保障本金）、不做交易建議（建議買入/好時機/這個幣會漲）、不做行情評價\n🔴 品牌：不比較競品、不說「規劃中」「即將推出」「敬請期待」、不說「中心化引擎」「Web2」「Web2.5」、不主動提及特定國家（含中國）\n🔴 營銷：不推薦幣種、不說「秒到」「零成本」「免費」、不替用戶決策\n🔴 隱私：不公開討論資金明細、不私信用戶、不暴露他人信息。⚠️ 可輸入 UID，不能貼證件\n\n📌 態度：❌「不好意思」→ ✅「感謝您的反饋」\n\n📌 測試：找出 5 句的違規\n① BTC 流動性好，建議從這個幣對開始\n② 不好意思久等了，這功能規劃中，敬請期待\n③ 我們比 XX 所手續費更低，提幣秒到\n④ BTC 短期會繼續漲，可以考慮加倉\n⑤ 您帳戶餘額 5,230 USDT，上次出金 2,000",en:"📌 Four Red Lines\n\n🔴 Compliance: No profit guarantees (guaranteed returns/zero risk/absolutely safe/capital protected), no trading advice (recommend buy/good timing/coin will rise), no market commentary\n🔴 Brand: No competitor comparisons, never say \"planned\"/\"coming soon\"/\"stay tuned\", never say \"centralized engine\"/\"Web2\"/\"Web2.5\", never mention specific countries (incl. China)\n🔴 Marketing: No coin recommendations, no \"instant\"/\"zero cost\"/\"free\", never decide for users\n🔴 Privacy: No public fund discussions, no DMs, no exposing others. ⚠️ UID ok, NO ID docs\n\n📌 Attitude: ❌ \"Sorry\" → ✅ \"Thank you for your feedback\"\n\n📌 Test: Find violations in 5 statements\n① BTC has good liquidity, suggest starting with this pair\n② Sorry for wait, this feature is planned, stay tuned\n③ Our fees lower than XX Exchange, withdrawals instant\n④ BTC should keep rising, consider adding positions\n⑤ Your balance 5,230 USDT, last withdrawal 2,000"},
checks:{zh:["① 推薦幣種+交易建議","② 不好意思+規劃中+敬請期待","③ 比較競品+秒到","④ 行情評價+交易建議","⑤ 公開討論資金明細"],en:["① Coin recommendation+trading advice","② Sorry+planned+stay tuned","③ Competitor comparison+instant","④ Market commentary+trading advice","⑤ Public fund details"]}},

{id:4,icon:"💡",title:{zh:"服務意識 + 場景框架",en:"Service Principles & Scenarios"},intro:{zh:"五條原則 + 六種場景 + Case 復盤 + 實操練習。",en:"5 principles + 6 scenarios + case reviews + practice."},
content:{zh:"📌 五條原則\n1️⃣ 先查再回 2️⃣ 回答用戶問的問題 3️⃣ 能做的先做了 4️⃣ 做了什麼告訴用戶 5️⃣ 知道答案就直接說\n📌 最終檢查：用戶還需要再問一次嗎？\n\n📌 六種場景\n1 知道答案→直接回答 2 需要查→查了什麼+狀態+時間 3 解決不了→做了什麼+轉誰+等多久 4 有情緒→感謝+做了什麼+下一步 5 不確定→先問再引導 6 暫不支持→據實告知+有時間線可說+感謝\n\n📌 Case\nCase 1「大概多久」→ 查後台給時間\nCase 2「核實 UID」→ 說你查了什麼\nCase 3「手機劃轉」→ 答案已知直接說\n\n📌 任務\nPart A 改寫：\nA（TG）充值 USDT 一小時沒到。原：「請耐心等候，發郵件。」\nB（郵件）支持 API？原：「規劃中，敬請期待！」\n\nPart B 判斷場景+寫 TG 回覆：\nQ1 手續費多少？ Q2 提幣兩天沒到？\nQ3 鏈上確認了餘額沒更新？ Q4 新手選現貨還合約？ Q5 有 API 嗎？",en:"📌 5 Principles\n1️⃣ Check before reply 2️⃣ Answer what was asked 3️⃣ Do what you can 4️⃣ Tell user what you did 5️⃣ If you know, say it\n📌 Final check: Will user need to ask again?\n\n📌 6 Scenarios\n1 Know→reply directly 2 Check→what+status+ETA 3 Can't solve→did what+escalate+wait 4 Emotional→thank+did+next 5 Unsure→ask then guide 6 Not supported→facts+timeline if known+thank\n\n📌 Cases\nCase 1 \"How long?\" → check backend, give ETA\nCase 2 \"Verify UID\" → tell what you checked\nCase 3 \"Mobile transfer\" → answer known, say directly\n\n📌 Tasks\nPart A Rewrite:\nA (TG) USDT deposit 1hr. Original: \"Please wait. Email us.\"\nB (Email) API support? Original: \"Planned, stay tuned!\"\n\nPart B Scenarios + TG reply:\nQ1 Fees? Q2 Withdrawal 2 days? Q3 On-chain confirmed no balance? Q4 New, spot or futures? Q5 API?"},
checks:{zh:["Case A：查後台+給時間+不發郵件","Case B：沒說規劃中/敬請期待/不好意思","Q1=場景1 直接回答","Q2=場景2 查了+狀態+時間","Q3=場景3/4 做了什麼+轉誰","Q4=場景5 先問再引導","Q5=場景6 據實+感謝","所有遵守紅線，TG 2-3句"],en:["A: Checked+ETA+no email","B: No planned/stay tuned/sorry","Q1=S1 direct","Q2=S2 checked+status+ETA","Q3=S3/4 did what+escalated","Q4=S5 ask then guide","Q5=S6 facts+thank","All red-line compliant, TG 2-3 sentences"]}},

{id:5,icon:"🌏",title:{zh:"Prompt 技巧 + 多語回覆",en:"Prompt Skills & Multilingual"},intro:{zh:"Prompt 公式 + Code 批量建範本。",en:"Prompt formula + batch templates with Code."},
content:{zh:"📌 公式：角色 + 紅線 + 場景 + 語氣 + 格式 + 語言\n\n❌「幫我回覆客戶」\n✅「你是 MC Markets 資深客服。紅線：[列出]。客戶：[貼上]。TG(2-3句)+Email，繁中+英文。共情→解釋→行動方案。」\n\n📌 用 Code 批量產出\nclaude > 建立 6 種場景各 2 問，TG+Email，中英雙語，遵守紅線，產出 Markdown\n\n📌 任務\n1. 用「出金三天沒收到」產出 TG+Email，繁中+英文\n2. 用 Code 產 4 場景範本：KYC/出金延遲/MT4登入/API暫不支持",en:"📌 Formula: Role + Red Lines + Scenario + Tone + Format + Language\n\n❌ \"Help reply\"\n✅ \"You're senior MC Markets CS. Red lines: [list]. Customer: [paste]. TG(2-3)+Email, CN+EN. Empathy→explain→action.\"\n\n📌 Batch with Code\nclaude > Build 6 scenarios × 2 questions, TG+Email, CN+EN, red lines, Markdown\n\n📌 Tasks\n1. \"Withdrawal 3 days\" → TG+Email, CN+EN\n2. Code → 4 templates: KYC/withdrawal/MT4/API"},
checks:{zh:["用了完整 Prompt 公式","TG 短版 2-3 句","Email 完整版","繁中+英文","遵守紅線","共情→解釋→行動方案","用 Code 產出了文件"],en:["Full Prompt formula","TG 2-3 sentences","Email full version","CN+EN","Red lines followed","Empathy→explain→action","Code output file"]}},

{id:6,icon:"🎫",title:{zh:"Jira 工單 + KB 更新",en:"Jira Tickets & KB Updates"},intro:{zh:"Claude 草擬，Code/Chrome 執行。可含 UID，不能含證件。",en:"Claude drafts, Code/Chrome executes. UID ok, NO ID docs."},
content:{zh:"📌 A — Jira 工單\nClaude 草擬 → 方法 A Code+MCP / B Cowork+Chrome / C 手動\n\n📌 B — KB 更新\nChrome 讀取 → Claude 草擬+對照表 → Code 產出 → 推送\n\n📌 任務\nA. UID TEST-001 入金 $500 銀行轉帳 24hr 未到\nB. 電匯出金 3-5→1-3 天，最低 $100→$50",en:"📌 A — Jira\nClaude drafts → Method A Code+MCP / B Cowork+Chrome / C manual\n\n📌 B — KB\nChrome reads → Claude drafts+changelog → Code outputs → push\n\n📌 Tasks\nA. UID TEST-001, $500 deposit pending 24hrs\nB. Wire 3-5→1-3 days, min $100→$50"},

{id:7,icon:"📊",title:{zh:"報表、SOP、郵件",en:"Reports, SOPs & Email"},intro:{zh:"三種文件一次學會。",en:"Three doc types in one module."},
content:{zh:"📌 A 週報 — 47 件（出入金18/帳戶12/交易9/KYC5/其他3），3升級，+12%\n📌 B SOP+FAQ — 密碼重設，SOP 3+步驟，FAQ 3+QA\n📌 C 郵件 — MT4轉MT5要重新開戶嗎？紀錄會保留嗎？中英+Subject",en:"📌 A Report — 47 (deposit 18/account 12/trading 9/KYC 5/other 3), 3 escalated, +12%\n📌 B SOP+FAQ — Password reset, SOP 3+ steps, FAQ 3+ Q&A\n📌 C Email — MT4→MT5 re-register? History kept? Bilingual+Subject"},

{id:8,icon:"⚡",title:{zh:"自動化 + 培訓方法",en:"Automation & Training Methods"},intro:{zh:"Chrome 自動化 + 每日對比方法論。",en:"Chrome automation + daily comparison methodology."},
content:{zh:"📌 A Chrome 自動化\nLevel 1 側欄操作 / Level 2 錄 Shortcut / Level 3 排程\n\n📌 B 每日對比（培訓）\n每天挑一條→改進版→並排。匿名、先肯定、「我們怎麼回更好」、先問大家、正面收尾\n用 Code 產出一組對比案例",en:"📌 A Chrome\nLevel 1 Side panel / Level 2 Record Shortcut / Level 3 Schedule\n\n📌 B Daily Comparison (Training)\nPick one reply → improved → side by side. Anonymize, start positive, \"how can WE improve\", ask team, positive ending\nUse Code for one comparison case"},

checks:{zh:["完成真實工作","2+ 工具","遵守紅線","品質可用","分享了經驗"],en:["Real task done","2+ tools","Red lines followed","Quality ready","Shared experience"]}}
];

const modColors=["#555","#1a6b4e","#c23","#d88c1a","#c05a30","#1868b7","#8a6b1e","#2e7d8a","#b33"];
const TOTAL=modules.reduce((a,m)=>a+m.checks.zh.length,0);
function isMC(m,st){return m.checks.zh.every((_,i)=>st["m"+m.id+"-"+i]);}
function isUL(m,st,pv){if(pv)return true;if(m.id===1)return true;const p=modules.find(x=>x.id===m.id-1);return p?isMC(p,st):true;}

function dlRec(name,mod,st,L){
  const now=new Date(),ds=now.getFullYear()+"-"+(now.getMonth()+1).toString().padStart(2,"0")+"-"+now.getDate().toString().padStart(2,"0");
  const cks=mod.checks[L],comp=cks.map((c,i)=>({item:c,done:!!st["m"+mod.id+"-"+i]})),dn=comp.filter(c=>c.done).length,all=dn===cks.length;
  let t="════════════════════════════════════════\n  "+ui.recTitle[L]+"\n════════════════════════════════════════\n\n";
  t+=ui.recName[L]+"："+name+"\n"+ui.recDate[L]+"："+ds+"\n"+ui.recTime[L]+"："+now.toLocaleTimeString(L==="zh"?"zh-TW":"en-US")+"\n";
  t+=ui.recCourse[L]+"：Module "+mod.id+" — "+mod.title[L]+"\n";
  t+=ui.recStatus[L]+"："+(all?"✅ "+ui.recAllDone[L]:"⬜ "+ui.recInProgress(dn,cks.length)[L])+"\n\n";
  t+="────────────────────────────────────────\n"+ui.recItems[L]+"：\n────────────────────────────────────────\n";
  comp.forEach(c=>{t+=(c.done?"✅":"⬜")+" "+c.item+"\n";});
  t+="\n"+ui.recRatio[L]+"："+dn+"/"+cks.length+" ("+Math.round(dn/cks.length*100)+"%)\n"+ui.recDlTime[L]+"："+now.toISOString()+"\n════════════════════════════════════════\n";
  const b=new Blob([t],{type:"text/plain;charset=utf-8"}),a=document.createElement("a");
  a.href=URL.createObjectURL(b);a.download="MCM-M"+mod.id+"-"+name+"-"+ds+".txt";a.click();URL.revokeObjectURL(a.href);
}

function NM({onSet,lang,setLang}){const[n,setN]=useState("");return(
<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
<div style={{width:340,textAlign:"center"}} className="fade-in">
<div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}><button onClick={()=>setLang(l=>l==="zh"?"en":"zh")} style={{padding:"4px 12px",borderRadius:6,border:"1px solid rgba(0,0,0,0.12)",background:"white",fontSize:12,fontWeight:600,cursor:"pointer",color:"#666"}}>{lang==="zh"?"EN":"中文"}</button></div>
<div style={{fontSize:11,fontWeight:700,color:"#c05a30",letterSpacing:"0.1em",marginBottom:4}}>{ui.brand[lang]}</div>
<h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>{ui.mainTitle[lang]}</h1>
<p style={{fontSize:12,color:"#888",marginBottom:6}}>{ui.loginSub[lang]}</p>
<p style={{fontSize:11,color:"#aaa",marginBottom:24}}>{ui.loginHint[lang]}</p>
<input value={n} onChange={e=>setN(e.target.value)} onKeyDown={e=>e.key==="Enter"&&n.trim()&&onSet(n.trim())} placeholder={ui.loginPlaceholder[lang]} autoFocus style={{width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid rgba(0,0,0,0.12)",fontSize:14,marginBottom:10,outline:"none"}}/>
<button onClick={()=>n.trim()&&onSet(n.trim())} disabled={!n.trim()} style={{width:"100%",padding:"10px",borderRadius:8,border:"none",background:"#1a1a1a",color:"white",fontSize:14,fontWeight:600,cursor:"pointer",opacity:n.trim()?1:0.4}}>{ui.loginBtn[lang]}</button>
</div></div>);}

function App(){
const[name,setName]=useState(()=>localStorage.getItem("mcm-mod-name")||"");
const[st,setSt]=useState(()=>name?load(name):{});
const[om,setOm]=useState(1);
const[pv,setPv]=useState(false);
const[lang,setLang]=useState(()=>localStorage.getItem("mcm-lang")||"zh");
const cr=useRef(0),ct=useRef(null);
const htc=()=>{cr.current++;clearTimeout(ct.current);ct.current=setTimeout(()=>{cr.current=0},1500);if(cr.current>=5){setPv(p=>!p);cr.current=0;}};
useEffect(()=>{if(name)setSt(load(name))},[name]);
useEffect(()=>{if(name)save(name,st)},[st]);
useEffect(()=>{localStorage.setItem("mcm-lang",lang)},[lang]);
const sns=n=>{setName(n);localStorage.setItem("mcm-mod-name",n);setSt(load(n));};
const chk=k=>setSt(p=>({...p,[k]:!p[k]}));
const td=modules.filter(m=>isMC(m,st)).length;
const cd=Object.values(st).filter(Boolean).length;
const L=lang;
if(!name)return <NM onSet={sns} lang={lang} setLang={setLang}/>;
const cm=modules.find(m=>m.id===om);

return(<div style={{maxWidth:700,margin:"0 auto",padding:"24px 14px 80px"}}>
{pv&&<div style={{padding:"8px 12px",borderRadius:8,background:"rgba(24,104,183,0.08)",border:"1px solid rgba(24,104,183,0.2)",marginBottom:12,fontSize:11,color:"#1868b7",fontWeight:600,display:"flex",justifyContent:"space-between",alignItems:"center"}}>{ui.previewOn[L]}<button onClick={()=>setPv(false)} style={{background:"none",border:"1px solid rgba(24,104,183,0.3)",borderRadius:4,padding:"2px 8px",fontSize:10,color:"#1868b7",cursor:"pointer"}}>{ui.previewClose[L]}</button></div>}

<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
<div style={{flex:1,cursor:"default",userSelect:"none"}} onClick={htc}><div style={{fontSize:11,fontWeight:700,color:"#c05a30",letterSpacing:"0.1em"}}>{ui.brand[L]}</div><h1 style={{fontSize:20,fontWeight:700,margin:"2px 0"}}>{ui.mainTitle[L]}</h1></div>
<button onClick={()=>setLang(l=>l==="zh"?"en":"zh")} style={{padding:"4px 12px",borderRadius:6,border:"1px solid rgba(0,0,0,0.12)",background:"white",fontSize:12,fontWeight:600,cursor:"pointer",color:"#666"}}>{L==="zh"?"EN":"中文"}</button>
<div style={{textAlign:"right"}}><div style={{fontSize:12,fontWeight:600}}>{name}</div><button onClick={()=>{setName("");setSt({});localStorage.removeItem("mcm-mod-name")}} style={{fontSize:10,color:"#aaa",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>{ui.switchUser[L]}</button></div>
</div>

<div style={{padding:"12px 14px",borderRadius:10,background:"rgba(0,0,0,0.02)",marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
<div style={{fontSize:28,fontWeight:700,color:td===NUM?"#3a7d68":"#c05a30"}}>{td}<span style={{fontSize:13,color:"#aaa"}}>/{NUM}</span></div>
<div style={{flex:1}}>
<div style={{fontSize:12,fontWeight:600,marginBottom:4}}>{td===NUM?ui.allDone[L]:td===0?ui.start[L]:ui.doneCount(td)[L]}</div>
<div style={{display:"flex",gap:2}}>{modules.map(m=><div key={m.id} style={{flex:1,height:6,borderRadius:3,background:isMC(m,st)?"#3a7d68":isUL(m,st,pv)?"rgba(192,90,48,0.2)":"rgba(0,0,0,0.06)"}}/>)}</div>
<div style={{fontSize:10,color:"#aaa",marginTop:3}}>{ui.checksLabel[L]}：{cd}/{TOTAL}</div>
</div></div>

<div style={{display:"grid",gridTemplateColumns:"repeat("+NUM+",1fr)",gap:3,marginBottom:20}}>
{modules.map(m=>{const u=isUL(m,st,pv),d=isMC(m,st),a=om===m.id;
const p=m.checks.zh.length?Math.round(m.checks.zh.filter((_,i)=>st["m"+m.id+"-"+i]).length/m.checks.zh.length*100):0;
return(<button key={m.id} onClick={()=>u&&setOm(m.id)} style={{padding:"7px 2px",borderRadius:8,border:a?"2px solid "+modColors[m.id-1]:"1px solid rgba(0,0,0,0.06)",background:d?"rgba(58,125,104,0.06)":a?modColors[m.id-1]+"08":"white",cursor:u?"pointer":"default",opacity:u?1:0.3,textAlign:"center",transition:"all 0.15s"}}>
<div style={{fontSize:16}}>{u?m.icon:"🔒"}</div>
<div style={{fontSize:8,fontWeight:700,color:d?"#3a7d68":"#666",marginTop:1}}>M{m.id}</div>
{d?<div style={{fontSize:7,color:"#3a7d68"}}>✅</div>:u&&p>0?<div style={{fontSize:7,color:"#c05a30"}}>{p}%</div>:null}
</button>);})}
</div>

{cm&&isUL(cm,st,pv)&&(<div className="fade-in" style={{borderRadius:12,border:"1.5px solid "+modColors[cm.id-1]+"25",overflow:"hidden"}}>
<div style={{padding:"16px 18px",background:modColors[cm.id-1]+"08"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<div style={{fontSize:11,fontWeight:700,color:modColors[cm.id-1]}}>MODULE {cm.id} {ui.moduleOf[L]}</div>
{cm.id<NUM&&<div style={{fontSize:10,color:"#999"}}>{isMC(cm,st)?ui.completedNextHint[L]:ui.incompleteHint[L]}</div>}
</div>
<div style={{fontSize:18,fontWeight:700,marginTop:4}}>{cm.icon} {cm.title[L]}</div>
<div style={{fontSize:12.5,color:"#555",marginTop:8,padding:"8px 10px",background:"rgba(255,255,255,0.6)",borderRadius:6}}>{cm.intro[L]}</div>
</div>
<div style={{padding:"16px 18px"}}>
<div style={{fontSize:12.5,color:"#333",lineHeight:1.9,whiteSpace:"pre-wrap",background:"rgba(0,0,0,0.015)",padding:"12px 14px",borderRadius:8,marginBottom:16}}>{cm.content[L]}</div>
<div style={{fontSize:11,fontWeight:700,color:"#888",marginBottom:8}}>{ui.checklistTitle[L]}</div>
{cm.checks[L].map((item,i)=>{const k="m"+cm.id+"-"+i,dn=st[k];return(
<label key={i} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"5px 0",cursor:"pointer",fontSize:12.5,color:dn?"#999":"#333"}}>
<input type="checkbox" checked={!!dn} onChange={()=>chk(k)} style={{marginTop:2.5,accentColor:"#3a7d68",width:16,height:16,cursor:"pointer"}}/>
<span style={{textDecoration:dn?"line-through":"none"}}>{item}</span></label>);})}
<div style={{marginTop:16,padding:"12px 14px",borderRadius:8,background:isMC(cm,st)?"rgba(58,125,104,0.06)":"rgba(0,0,0,0.02)",border:"1px solid "+(isMC(cm,st)?"rgba(58,125,104,0.2)":"rgba(0,0,0,0.06)")}}>
{isMC(cm,st)?(<div>
<div style={{fontSize:14,fontWeight:700,color:"#3a7d68",marginBottom:4}}>{ui.modComplete(cm.id)[L]}{cm.id<NUM?ui.nextUnlocked[L]:ui.allTrainingDone[L]}</div>
<button onClick={()=>dlRec(name,cm,st,L)} style={{width:"100%",padding:"10px",borderRadius:8,border:"none",background:"#3a7d68",color:"white",fontSize:13,fontWeight:600,cursor:"pointer",marginTop:6}}>{ui.downloadBtn[L]}</button>
<div style={{fontSize:10.5,color:"#888",marginTop:6,textAlign:"center"}}>{ui.downloadHint[L]}</div>
{cm.id<NUM&&<button onClick={()=>setOm(cm.id+1)} style={{width:"100%",padding:"10px",borderRadius:8,border:"1px solid rgba(24,104,183,0.3)",background:"rgba(24,104,183,0.05)",color:"#1868b7",fontSize:13,fontWeight:600,cursor:"pointer",marginTop:8}}>{ui.goNext(cm.id+1)[L]}</button>}
</div>):(<div style={{fontSize:12,color:"#888"}}>{ui.pendingHint[L]}</div>)}
</div></div></div>)}

{cm&&!isUL(cm,st,pv)&&(<div className="fade-in" style={{borderRadius:12,border:"1px solid rgba(0,0,0,0.06)",padding:"40px 20px",textAlign:"center"}}>
<div style={{fontSize:36,marginBottom:8}}>🔒</div>
<div style={{fontSize:14,fontWeight:600,color:"#666"}}>{ui.locked(cm.id)[L]}</div>
<div style={{fontSize:12,color:"#aaa",marginTop:4}}>{ui.lockedHint(cm.id)[L]}</div>
<button onClick={()=>setOm(cm.id-1)} style={{marginTop:12,padding:"8px 16px",borderRadius:8,border:"1px solid rgba(0,0,0,0.1)",background:"white",fontSize:12,fontWeight:600,cursor:"pointer",color:"#666"}}>{ui.goBack(cm.id-1)[L]}</button>
</div>)}

<div style={{marginTop:24,padding:"10px 12px",borderRadius:8,background:"rgba(220,50,50,0.03)",border:"1px solid rgba(220,50,50,0.07)",fontSize:10.5,color:"#888",lineHeight:1.7}}>
<span style={{fontWeight:700,color:"#b33"}}>{ui.privacyRedline[L]}</span> {ui.privacyText[L]}</div>
<div style={{marginTop:8,padding:"14px 16px",borderRadius:10,background:"linear-gradient(135deg,rgba(24,104,183,0.06),rgba(58,125,104,0.06))",border:"1px solid rgba(24,104,183,0.12)",display:"flex",alignItems:"center",gap:12}}>
<div style={{fontSize:28,lineHeight:1}}>💬</div>
<div><div style={{fontSize:13,fontWeight:700}}>{ui.helpTitle[L]}</div>
<div style={{fontSize:12,color:"#555",marginTop:2}}>{ui.helpText[L]} <span style={{fontWeight:700,color:"#1868b7"}}>Wilson</span> {ui.helpSuffix[L]}</div></div>
</div></div>);}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
