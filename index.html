content:`📌 四大紅線類別

🔴 合規紅線
• 不做收益承諾：不說「保證收益」「穩賺」「零風險」「絕對安全」「保本」「盡量保障本金」
• 不做交易建議：不說「建議買入/賣出」「現在是好時機」「這個幣會漲」
• 不做行情評價：不預測價格走勢、不評價市場好壞

🔴 品牌紅線
• 不比較競品，不提對手名字
• 不說「規劃中」「即將推出」「敬請期待」：功能有就說有，沒有就說沒有
• 不說「中心化引擎」「去中心化交易所」「非託管」「Web2」「Web2.5」
• 不主動提及特定國家（包括中國）

🔴 營銷紅線
• 不推薦具體幣種或交易對：不說「BTC 流動性好」「建議選這個幣對」
• 不用促銷語言：不說「秒到」「零成本」「免費」，用事實陳述（「實時到賬」「不收取額外費用」）
• 不替用戶做交易決策

🔴 隱私紅線
• 不在公開渠道討論用戶資金明細
• 不私信用戶
• 不暴露其他用戶信息
• ⚠️ 可以在 Claude 中輸入用戶 UID 查詢，但絕不能貼證件照片或證件號碼

📌 態度原則
❌ 不說「不好意思」「抱歉」
✅ 說「感謝您的反饋/參與」
• 功能暫不支持 → 感謝反饋，不道歉

content:`📌 五條原則

1️⃣ 先查再回：花 1 分鐘查後台（manage / back office），帶著事實回覆
2️⃣ 回答用戶問的問題：問多久就給時間預期，問為什麼就給原因。「請耐心等候」不是回答
3️⃣ 能做的先做了：能查到的直接查，能先處理的先處理
4️⃣ 做了什麼告訴用戶：你查了兩個系統核對了地址，多說一句
5️⃣ 知道答案就直接說：不是每個問題都需要走模板

📌 最終檢查：這條消息發出去，用戶還需要再來問一次嗎？

📌 六種場景框架

場景 1：你知道答案 → 直接回答 + 用戶接下來怎麼做
場景 2：需要查了才能答 → 你查了什麼 + 當前狀態 + 預計時間
場景 3：你解決不了 → 你做了什麼 + 轉給了誰 + 用戶等多久
場景 4：用戶有情緒 → 感謝反饋 + 你做了什麼 + 接下來怎麼處理
場景 5：用戶不確定怎麼做 → 先問情況 → 再引導（不替用戶決策）
場景 6：功能暫不支持 → 據實告知 + 有明確時間線可以說（如手機 APP 下半年）+ 感謝反饋

📌 渠道差異
TG 群：講人話、2-3 句、不需要模板格式
郵件：正式但不官腔、可以稍長、結構完整

/* ═══ Unlock logic: completion-based ═══ */
function isModuleComplete(mod, st){
  return mod.checks.every((_,i)=>st[`m${mod.id}-${i}`]);
}
function isUnlocked(mod, st, preview){
  if(preview) return true;
  if(mod.id===1) return true; // Module 1 always open
  const prev = modules.find(m=>m.id===mod.id-1);
  return prev ? isModuleComplete(prev, st) : true;
}

  txt+=`姓名：${name}\n`;
  txt+=`日期：${dateStr}\n`;
  txt+=`時間：${now.toLocaleTimeString('zh-TW')}\n`;
  txt+=`課程：Module ${mod.id} — ${mod.title}\n`;
  txt+=`狀態：${allDone?'✅ 全部完成':`⬜ 進行中 (${doneCount}/${mod.checks.length})`}\n\n`;
  txt+=`────────────────────────────────────────\n`;
  txt+=`完成項目：\n`;
  txt+=`────────────────────────────────────────\n`;
  completed.forEach(c=>{txt+=`${c.done?'✅':'⬜'} ${c.item}\n`;});
  txt+=`\n完成比例：${doneCount}/${mod.checks.length} (${Math.round(doneCount/mod.checks.length*100)}%)\n`;
  txt+=`下載時間：${now.toISOString()}\n`;
  txt+=`════════════════════════════════════════\n`;

  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`MCM-Module${mod.id}-${name}-${dateStr}.txt`;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ═══ Components ═══ */
function NameModal({onSet}){
  const[n,setN]=useState('');
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:340,textAlign:"center"}} className="fade-in">
        <div style={{fontSize:11,fontWeight:700,color:"#c05a30",letterSpacing:"0.1em",marginBottom:4}}>MC MARKETS AI LAB</div>
        <h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>Claude 實戰訓練</h1>
        <p style={{fontSize:12,color:"#888",marginBottom:6}}>8 個 Module，逐步解鎖，按照自己的節奏完成</p>
        <p style={{fontSize:11,color:"#aaa",marginBottom:24}}>完成當前 Module 後自動解鎖下一個</p>
        <input value={n} onChange={e=>setN(e.target.value)} onKeyDown={e=>e.key==='Enter'&&n.trim()&&onSet(n.trim())}
          placeholder="輸入你的名字" autoFocus
          style={{width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid rgba(0,0,0,0.12)",fontSize:14,marginBottom:10,outline:"none"}}/>
        <button onClick={()=>n.trim()&&onSet(n.trim())} disabled={!n.trim()}
          style={{width:"100%",padding:"10px",borderRadius:8,border:"none",background:"#1a1a1a",color:"white",fontSize:14,fontWeight:600,cursor:"pointer",opacity:n.trim()?1:0.4}}>
          開始訓練
        </button>
      </div>
    </div>
  );
}

function App(){
  const[name,setName]=useState(()=>localStorage.getItem('mcm-mod-name')||'');
  const[st,setSt]=useState(()=>name?load(name):{});
  const[openMod,setOpenMod]=useState(1);
  const[preview,setPreview]=useState(false);
  const clickRef=useRef(0);
  const clickTimer=useRef(null);

  const handleTitleClick=()=>{
    clickRef.current++;
    clearTimeout(clickTimer.current);
    clickTimer.current=setTimeout(()=>{clickRef.current=0},1500);
    if(clickRef.current>=5){setPreview(p=>!p);clickRef.current=0;}
  };

  useEffect(()=>{if(name)setSt(load(name))},[name]);
  useEffect(()=>{if(name)save(name,st)},[st]);

  const setNameAndSave=n=>{setName(n);localStorage.setItem('mcm-mod-name',n);setSt(load(n));};
  const chk=k=>setSt(p=>({...p,[k]:!p[k]}));
  const modDone=m=>isModuleComplete(m,st);
  const totalDone=modules.filter(m=>modDone(m)).length;
  const checksDone=Object.values(st).filter(Boolean).length;

  if(!name) return <NameModal onSet={setNameAndSave}/>;

  const curMod=modules.find(m=>m.id===openMod);

  return(
  <div style={{maxWidth:700,margin:"0 auto",padding:"24px 14px 80px"}}>

    {/* Preview banner */}
    {preview&&<div style={{padding:"8px 12px",borderRadius:8,background:"rgba(24,104,183,0.08)",border:"1px solid rgba(24,104,183,0.2)",marginBottom:12,fontSize:11,color:"#1868b7",fontWeight:600,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      🔓 預覽模式：全部 Module 已解鎖
      <button onClick={()=>setPreview(false)} style={{background:"none",border:"1px solid rgba(24,104,183,0.3)",borderRadius:4,padding:"2px 8px",fontSize:10,color:"#1868b7",cursor:"pointer"}}>關閉</button>
    </div>}

    {/* Header */}
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
      <div style={{flex:1,cursor:"default",userSelect:"none"}} onClick={handleTitleClick}>
        <div style={{fontSize:11,fontWeight:700,color:"#c05a30",letterSpacing:"0.1em"}}>MC MARKETS AI LAB</div>
        <h1 style={{fontSize:20,fontWeight:700,margin:"2px 0"}}>Claude 實戰訓練</h1>
      </div>
      <div style={{textAlign:"right"}}>
        <div style={{fontSize:12,fontWeight:600}}>{name}</div>
        <button onClick={()=>{setName('');setSt({});localStorage.removeItem('mcm-mod-name')}} style={{fontSize:10,color:"#aaa",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>換人</button>
      </div>
    </div>

    {/* Overall progress */}
    <div style={{padding:"12px 14px",borderRadius:10,background:"rgba(0,0,0,0.02)",marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
      <div style={{fontSize:28,fontWeight:700,color:totalDone===8?"#3a7d68":"#c05a30"}}>{totalDone}<span style={{fontSize:13,color:"#aaa"}}>/8</span></div>
      <div style={{flex:1}}>
        <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>
          {totalDone===8?"🎉 全部完成！恭喜！":totalDone===0?"完成 Module 1 解鎖下一個":`已完成 ${totalDone} 個 Module`}
        </div>
        <div style={{display:"flex",gap:3}}>
          {modules.map(m=>(
            <div key={m.id} style={{flex:1,height:6,borderRadius:3,
              background:modDone(m)?"#3a7d68":isUnlocked(m,st,preview)?"rgba(192,90,48,0.2)":"rgba(0,0,0,0.06)"}}/>
          ))}
        </div>
        <div style={{fontSize:10,color:"#aaa",marginTop:3}}>完成項目：{checksDone}/{TOTAL}</div>
      </div>
    </div>

    {/* Module cards */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:20}}>
      {modules.map(m=>{
        const unlocked=isUnlocked(m,st,preview);
        const done=modDone(m);
        const active=openMod===m.id;
        const pct=m.checks.length?Math.round(m.checks.filter((_,i)=>st[`m${m.id}-${i}`]).length/m.checks.length*100):0;
        return(
          <button key={m.id} onClick={()=>unlocked&&setOpenMod(m.id)}
            style={{padding:"10px 6px",borderRadius:10,
              border:active?`2px solid ${modColors[m.id-1]}`:"1px solid rgba(0,0,0,0.06)",
              background:done?"rgba(58,125,104,0.06)":active?`${modColors[m.id-1]}08`:"white",
              cursor:unlocked?"pointer":"default",opacity:unlocked?1:0.3,
              textAlign:"center",transition:"all 0.15s"}}>
            <div style={{fontSize:20}}>{unlocked?m.icon:"🔒"}</div>
            <div style={{fontSize:9.5,fontWeight:700,color:done?"#3a7d68":"#666",marginTop:2}}>Module {m.id}</div>
            {done?<div style={{fontSize:9,color:"#3a7d68"}}>✅</div>
              :unlocked&&pct>0?<div style={{fontSize:9,color:"#c05a30"}}>{pct}%</div>
              :null}
          </button>
        );
      })}
    </div>

    {/* Active module content */}
    {curMod&&isUnlocked(curMod,st,preview)&&(
      <div className="fade-in" style={{borderRadius:12,border:`1.5px solid ${modColors[curMod.id-1]}25`,overflow:"hidden"}}>
        {/* Header */}
        <div style={{padding:"16px 18px",background:`${modColors[curMod.id-1]}08`}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{fontSize:11,fontWeight:700,color:modColors[curMod.id-1],letterSpacing:"0.06em"}}>MODULE {curMod.id} OF 8</div>
            {curMod.id>1&&!isUnlocked(modules[curMod.id-2],st,preview)?null:
              curMod.id<8&&<div style={{fontSize:10,color:"#999"}}>
                {modDone(curMod)?"✅ 已完成 — 下一個已解鎖":"完成所有項目解鎖下一個 Module"}
              </div>
            }
          </div>
          <div style={{fontSize:18,fontWeight:700,marginTop:4}}>{curMod.icon} {curMod.title}</div>
          <div style={{fontSize:11,color:"#999"}}>{curMod.titleEn}</div>
          <div style={{fontSize:12.5,color:"#555",marginTop:8,padding:"8px 10px",background:"rgba(255,255,255,0.6)",borderRadius:6}}>{curMod.intro}</div>
        </div>

        {/* Content */}
        <div style={{padding:"16px 18px"}}>
          <div style={{fontSize:12.5,color:"#333",lineHeight:1.9,whiteSpace:"pre-wrap",background:"rgba(0,0,0,0.015)",padding:"12px 14px",borderRadius:8,marginBottom:16}}>{curMod.content}</div>

          {/* Checklist */}
          <div style={{fontSize:11,fontWeight:700,color:"#888",marginBottom:8,letterSpacing:"0.04em"}}>☑️ 完成標準 — 全部勾選後解鎖下一個 Module</div>
          {curMod.checks.map((item,i)=>{
            const k=`m${curMod.id}-${i}`;
            const dn=st[k];
            return(
              <label key={i} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"5px 0",cursor:"pointer",fontSize:12.5,color:dn?"#999":"#333"}}>
                <input type="checkbox" checked={!!dn} onChange={()=>chk(k)}
                  style={{marginTop:2.5,accentColor:"#3a7d68",width:16,height:16,cursor:"pointer"}}/>
                <span style={{textDecoration:dn?"line-through":"none"}}>{item}</span>
              </label>
            );
          })}

          {/* Status + Download */}
          <div style={{marginTop:16,padding:"12px 14px",borderRadius:8,
            background:modDone(curMod)?"rgba(58,125,104,0.06)":"rgba(0,0,0,0.02)",
            border:`1px solid ${modDone(curMod)?"rgba(58,125,104,0.2)":"rgba(0,0,0,0.06)"}`}}>

            {modDone(curMod)?(
              <div>
                <div style={{fontSize:14,fontWeight:700,color:"#3a7d68",marginBottom:4}}>
                  ✅ Module {curMod.id} 完成！{curMod.id<8?" 下一個 Module 已解鎖 🔓":" 全部訓練完成！🎉"}
                </div>
                <button onClick={()=>downloadRecord(name,curMod,st)}
                  style={{width:"100%",padding:"10px",borderRadius:8,border:"none",background:"#3a7d68",color:"white",fontSize:13,fontWeight:600,cursor:"pointer",marginTop:6}}>
                  📥 下載完成紀錄
                </button>
                <div style={{fontSize:10.5,color:"#888",marginTop:6,textAlign:"center"}}>
                  下載後把檔案交給主管做登記
                </div>
                {curMod.id<8&&(
                  <button onClick={()=>setOpenMod(curMod.id+1)}
                    style={{width:"100%",padding:"10px",borderRadius:8,border:"1px solid rgba(24,104,183,0.3)",background:"rgba(24,104,183,0.05)",color:"#1868b7",fontSize:13,fontWeight:600,cursor:"pointer",marginTop:8}}>
                    前往 Module {curMod.id+1} →
                  </button>
                )}
              </div>
            ):(
              <div style={{fontSize:12,color:"#888"}}>
                完成上方所有項目後可下載紀錄並解鎖下一個 Module 📥
              </div>
            )}
          </div>
        </div>
      </div>
    )}

    {/* Locked module message */}
    {curMod&&!isUnlocked(curMod,st,preview)&&(
      <div className="fade-in" style={{borderRadius:12,border:"1px solid rgba(0,0,0,0.06)",padding:"40px 20px",textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:8}}>🔒</div>
        <div style={{fontSize:14,fontWeight:600,color:"#666"}}>Module {curMod.id} 尚未解鎖</div>
        <div style={{fontSize:12,color:"#aaa",marginTop:4}}>請先完成 Module {curMod.id-1} 的所有項目</div>
        <button onClick={()=>setOpenMod(curMod.id-1)}
          style={{marginTop:12,padding:"8px 16px",borderRadius:8,border:"1px solid rgba(0,0,0,0.1)",background:"white",fontSize:12,fontWeight:600,cursor:"pointer",color:"#666"}}>
          ← 回到 Module {curMod.id-1}
        </button>
      </div>
    )}

    {/* Footer */}
    <div style={{marginTop:24,padding:"10px 12px",borderRadius:8,background:"rgba(220,50,50,0.03)",border:"1px solid rgba(220,50,50,0.07)",fontSize:10.5,color:"#888",lineHeight:1.7}}>
      <span style={{fontWeight:700,color:"#b33"}}>⚠️ 隱私紅線：</span> ✅ 可輸入 UID　🚫 不能貼證件照片/號碼　📌 所有對外內容須主管審核
    </div>

    {/* Help */}
    <div style={{marginTop:8,padding:"14px 16px",borderRadius:10,background:"linear-gradient(135deg, rgba(24,104,183,0.06), rgba(58,125,104,0.06))",border:"1px solid rgba(24,104,183,0.12)",display:"flex",alignItems:"center",gap:12}}>
      <div style={{fontSize:28,lineHeight:1}}>💬</div>
      <div>
        <div style={{fontSize:13,fontWeight:700,color:"#1a1a1a"}}>遇到問題？需要幫助？</div>
        <div style={{fontSize:12,color:"#555",marginTop:2}}>操作上有任何不理解或使用困難，請直接找 <span style={{fontWeight:700,color:"#1868b7"}}>Wilson</span> 協助，不要卡著不問！</div>
        <div style={{fontSize:10.5,color:"#999",marginTop:2}}>If you have any questions or need help, please reach out to <b>Wilson</b> directly.</div>
      </div>
    </div>
  </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
