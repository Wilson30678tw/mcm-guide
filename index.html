{id:2,icon:"🚫",
title:{zh:"客服回覆紅線規則",en:"CS Reply Red Lines & Compliance"},
intro:{zh:"記住哪些話絕對不能說。這不是建議，是底線。",en:"Know what you must NEVER say. These are hard limits, not suggestions."},
content:{zh:`📌 四大紅線類別

🔴 合規紅線
• 不做收益承諾：不說「保證收益」「穩賺」「零風險」「絕對安全」「保本」「盡量保障本金」
• 不做交易建議：不說「建議買入/賣出」「現在是好時機」「這個幣會漲」
• 不做行情評價：不預測價格走勢、不評價市場好壞

🔴 品牌紅線
• 不比較競品，不提對手名字
• 不說「規劃中」「即將推出」「敬請期待」：功能有就說有，沒有就說沒有
• 不說「中心化引擎」「去中心化交易所」「非託管」「Web2」「Web2.5」
• 不主動提及特定國家（包括中國）

🔴 營銷紅線
• 不推薦具體幣種或交易對
• 不用促銷語言：不說「秒到」「零成本」「免費」，用事實陳述
• 不替用戶做交易決策

🔴 隱私紅線
• 不在公開渠道討論用戶資金明細
• 不私信用戶、不暴露其他用戶信息
• ⚠️ 可以輸入用戶 UID，但絕不能貼證件照片或證件號碼

📌 態度原則
❌ 不說「不好意思」「抱歉」
✅ 說「感謝您的反饋/參與」

📌 測試：找出以下 5 句的所有紅線違規

① 「BTC 流動性比較好，建議您可以從這個幣對開始交易。」
② 「不好意思讓您久等了，這個功能我們規劃中，敬請期待！」
③ 「我們比 XX 交易所手續費更低，而且提幣秒到。」
④ 「根據目前行情，BTC 短期應該會繼續漲，您可以考慮加倉。」
⑤ 「您的帳戶餘額是 5,230 USDT，上次出金 2,000 USDT 到 0x3f...a8。」`,
en:`📌 Four Red Line Categories

🔴 Compliance
• No profit guarantees: never say "guaranteed returns", "zero risk", "absolutely safe", "capital protected"
• No trading advice: never say "recommend buy/sell", "now is a good time", "this coin will rise"
• No market commentary: don't predict prices or evaluate markets

🔴 Brand
• Never compare competitors or mention their names
• Never say "planned", "coming soon", "stay tuned" — if a feature exists, say yes; if not, say no
• Never say "centralized engine", "decentralized exchange", "non-custodial", "Web2", "Web2.5"
• Never proactively mention specific countries (including China)

🔴 Marketing
• Never recommend specific coins or trading pairs
• No promotional language: don't say "instant", "zero cost", "free" — use factual statements
• Never make trading decisions for users

🔴 Privacy
• Never discuss user fund details in public channels
• Never DM users, never expose other users' information
• ⚠️ User UID can be entered in Claude, but NEVER paste ID documents or ID numbers

📌 Attitude
❌ Never say "sorry" or "apologies"
✅ Say "Thank you for your feedback/participation"

📌 Test: Find ALL red line violations in these 5 statements

① "BTC has good liquidity, I suggest you start with this pair."
② "Sorry for the wait, this feature is planned, stay tuned!"
③ "Our fees are lower than XX Exchange, and withdrawals are instant."
④ "Based on the current market, BTC should keep rising. You can consider adding positions."
⑤ "Your balance is 5,230 USDT. Last withdrawal was 2,000 USDT to 0x3f...a8."`},
checks:{zh:["① 推薦幣種 + 做交易建議","② 說了「不好意思」+「規劃中」+「敬請期待」","③ 比較競品 + 促銷語言「秒到」","④ 行情評價 + 交易建議","⑤ 公開討論資金明細"],
en:["① Recommended a coin + gave trading advice","② Said \"sorry\" + \"planned\" + \"stay tuned\"","③ Compared competitor + promotional language \"instant\"","④ Market commentary + trading advice","⑤ Discussed fund details publicly"]}},

{id:3,icon:"💡",
title:{zh:"服務意識 + 場景框架",en:"Service Principles & Scenario Frameworks"},
intro:{zh:"回覆 ≠ 服務。掌握五條原則和六種場景框架。",en:"Replying ≠ Service. Master 5 principles and 6 scenario frameworks."},
content:{zh:`📌 五條原則
1️⃣ 先查再回：查後台，帶著事實回覆
2️⃣ 回答用戶問的問題：問多久給時間，問為什麼給原因
3️⃣ 能做的先做了
4️⃣ 做了什麼告訴用戶
5️⃣ 知道答案就直接說

📌 六種場景
1 知道答案→直接回答
2 需要查→查了什麼+狀態+時間
3 解決不了→你做了什麼+轉誰+等多久
4 有情緒→感謝+已做什麼+下一步
5 不確定→先問再引導（不替決策）
6 暫不支持→據實告知+有時間線可說+感謝

📌 三個 Case
Case 1「大概多久」→ 查後台給時間
Case 2「核實 UID」→ 說你查了什麼
Case 3「手機劃轉」→ 答案已知直接說

📌 任務
Part A — 改寫：
Case A（TG）：「充值 USDT 一小時沒到帳」原回覆：「請耐心等候，有問題請發郵件。」
Case B（郵件）：「支持 API 嗎？」原回覆：「規劃中，敬請期待！」

Part B — 判斷場景+寫 TG 回覆：
Q1：手續費是多少？ Q2：提幣兩天沒到？
Q3：鏈上確認了但餘額沒更新，系統有問題？
Q4：新手，不知道選現貨還合約？ Q5：有 API 嗎？`,
en:`📌 5 Principles
1️⃣ Check before replying: check backend, reply with facts
2️⃣ Answer what was asked: if they ask "how long", give a time estimate
3️⃣ Do what you can first
4️⃣ Tell users what you did
5️⃣ If you know the answer, say it directly

📌 6 Scenarios
1 You know the answer → reply directly
2 Need to check → what you checked + status + ETA
3 Can't solve it → what you did + who you escalated to + how long to wait
4 User is emotional → thank + what you did + next steps
5 User is unsure → ask first, then guide (don't decide for them)
6 Not supported → state facts + give timeline if known + thank feedback

📌 3 Real Cases
Case 1 "How long?" → Check backend, give time estimate
Case 2 "Verify UID" → Tell user what you checked
Case 3 "Mobile transfer" → Answer known, say it directly

📌 Tasks
Part A — Rewrite:
Case A (TG): "USDT deposit not received after 1 hour" Original: "Please wait patiently. Email us if needed."
Case B (Email): "Do you support API?" Original: "This feature is planned, stay tuned!"

Part B — Identify scenario + write TG reply:
Q1: What are the fees? Q2: Withdrawal pending 2 days?
Q3: On-chain confirmed but balance not updated, system bug?
Q4: I'm new, should I pick spot or futures?  Q5: Do you have an API?`},
checks:{zh:["Case A：先查後台 + 給時間預期 + 不讓用戶發郵件","Case B：沒說「規劃中」「敬請期待」「不好意思」","Q1 = 場景 1，直接回答","Q2 = 場景 2，查了+狀態+時間","Q3 = 場景 3/4，做了什麼+轉給誰（帶情緒先感謝）","Q4 = 場景 5，先問再引導不替決策","Q5 = 場景 6，據實告知+感謝","所有回覆遵守紅線，TG 版 2-3 句"],
en:["Case A: Checked backend + gave ETA + didn't redirect to email","Case B: Didn't say \"planned\", \"stay tuned\", or \"sorry\"","Q1 = Scenario 1, direct answer","Q2 = Scenario 2, checked + status + ETA","Q3 = Scenario 3/4, what you did + escalated to whom (thank first if emotional)","Q4 = Scenario 5, ask first then guide, don't decide for user","Q5 = Scenario 6, state facts + thank feedback","All replies follow red lines, TG version 2-3 sentences"]}},

const modColors=["#555","#c23","#d88c1a","#c05a30","#1868b7","#8a6b1e","#2e7d8a","#b33"];
const TOTAL=modules.reduce((a,m)=>a+m.checks.zh.length,0);

function isModuleComplete(mod,st){return mod.checks.zh.every((_,i)=>st[`m${mod.id}-${i}`]);}
function isUnlocked(mod,st,pv){if(pv)return true;if(mod.id===1)return true;const prev=modules.find(m=>m.id===mod.id-1);return prev?isModuleComplete(prev,st):true;}

function downloadRecord(name,mod,st,lang){
  const now=new Date();
  const ds=`${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`;
  const cks=mod.checks[lang];
  const completed=cks.map((c,i)=>({item:c,done:!!st[`m${mod.id}-${i}`]}));
  const dn=completed.filter(c=>c.done).length;
  const all=dn===cks.length;
  const L=lang==='zh';

  let t=`════════════════════════════════════════\n`;
  t+=`  ${ui.recTitle[lang]}\n`;
  t+=`════════════════════════════════════════\n\n`;
  t+=`${ui.recName[lang]}：${name}\n`;
  t+=`${ui.recDate[lang]}：${ds}\n`;
  t+=`${ui.recTime[lang]}：${now.toLocaleTimeString(L?'zh-TW':'en-US')}\n`;
  t+=`${ui.recCourse[lang]}：Module ${mod.id} — ${mod.title[lang]}\n`;
  t+=`${ui.recStatus[lang]}：${all?'✅ '+ui.recAllDone[lang]:'⬜ '+ui.recInProgress(dn,cks.length)[lang]}\n\n`;
  t+=`────────────────────────────────────────\n${ui.recItems[lang]}：\n────────────────────────────────────────\n`;
  completed.forEach(c=>{t+=`${c.done?'✅':'⬜'} ${c.item}\n`;});
  t+=`\n${ui.recRatio[lang]}：${dn}/${cks.length} (${Math.round(dn/cks.length*100)}%)\n`;
  t+=`${ui.recDlTime[lang]}：${now.toISOString()}\n════════════════════════════════════════\n`;

  const blob=new Blob([t],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`MCM-Module${mod.id}-${name}-${ds}.txt`;a.click();URL.revokeObjectURL(a.href);
}

/* ═══ App ═══ */
function NameModal({onSet,lang,setLang}){
  const[n,setN]=useState('');
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:340,textAlign:"center"}} className="fade-in">
        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
          <button onClick={()=>setLang(l=>l==='zh'?'en':'zh')} style={{padding:"4px 12px",borderRadius:6,border:"1px solid rgba(0,0,0,0.12)",background:"white",fontSize:12,fontWeight:600,cursor:"pointer",color:"#666"}}>{lang==='zh'?'EN':'中文'}</button>
        </div>
        <div style={{fontSize:11,fontWeight:700,color:"#c05a30",letterSpacing:"0.1em",marginBottom:4}}>{ui.brand[lang]}</div>
        <h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>{ui.mainTitle[lang]}</h1>
        <p style={{fontSize:12,color:"#888",marginBottom:6}}>{ui.loginSub[lang]}</p>
        <p style={{fontSize:11,color:"#aaa",marginBottom:24}}>{ui.loginHint[lang]}</p>
        <input value={n} onChange={e=>setN(e.target.value)} onKeyDown={e=>e.key==='Enter'&&n.trim()&&onSet(n.trim())}
          placeholder={ui.loginPlaceholder[lang]} autoFocus
          style={{width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid rgba(0,0,0,0.12)",fontSize:14,marginBottom:10,outline:"none"}}/>
        <button onClick={()=>n.trim()&&onSet(n.trim())} disabled={!n.trim()}
          style={{width:"100%",padding:"10px",borderRadius:8,border:"none",background:"#1a1a1a",color:"white",fontSize:14,fontWeight:600,cursor:"pointer",opacity:n.trim()?1:0.4}}>
          {ui.loginBtn[lang]}
        </button>
      </div>
    </div>
  );
}

function App(){
  const[name,setName]=useState(()=>localStorage.getItem('mcm-mod-name')||'');
  const[st,setSt]=useState(()=>name?load(name):{});
  const[openMod,setOpenMod]=useState(1);
  const[preview,setPreview]=useState(false);
  const[lang,setLang]=useState(()=>localStorage.getItem('mcm-lang')||'zh');
  const clickRef=useRef(0);const clickTimer=useRef(null);

  const handleTitleClick=()=>{clickRef.current++;clearTimeout(clickTimer.current);clickTimer.current=setTimeout(()=>{clickRef.current=0},1500);if(clickRef.current>=5){setPreview(p=>!p);clickRef.current=0;}};

  useEffect(()=>{if(name)setSt(load(name))},[name]);
  useEffect(()=>{if(name)save(name,st)},[st]);
  useEffect(()=>{localStorage.setItem('mcm-lang',lang)},[lang]);

  const setNameAndSave=n=>{setName(n);localStorage.setItem('mcm-mod-name',n);setSt(load(n));};
  const chk=k=>setSt(p=>({...p,[k]:!p[k]}));
  const modDone=m=>isModuleComplete(m,st);
  const totalDone=modules.filter(m=>modDone(m)).length;
  const checksDone=Object.values(st).filter(Boolean).length;
  const L=lang;

  if(!name) return <NameModal onSet={setNameAndSave} lang={lang} setLang={setLang}/>;

  const curMod=modules.find(m=>m.id===openMod);

  return(
  <div style={{maxWidth:700,margin:"0 auto",padding:"24px 14px 80px"}}>

    {preview&&<div style={{padding:"8px 12px",borderRadius:8,background:"rgba(24,104,183,0.08)",border:"1px solid rgba(24,104,183,0.2)",marginBottom:12,fontSize:11,color:"#1868b7",fontWeight:600,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      {ui.previewOn[L]}
      <button onClick={()=>setPreview(false)} style={{background:"none",border:"1px solid rgba(24,104,183,0.3)",borderRadius:4,padding:"2px 8px",fontSize:10,color:"#1868b7",cursor:"pointer"}}>{ui.previewClose[L]}</button>
    </div>}

    {/* Header */}
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
      <div style={{flex:1,cursor:"default",userSelect:"none"}} onClick={handleTitleClick}>
        <div style={{fontSize:11,fontWeight:700,color:"#c05a30",letterSpacing:"0.1em"}}>{ui.brand[L]}</div>
        <h1 style={{fontSize:20,fontWeight:700,margin:"2px 0"}}>{ui.mainTitle[L]}</h1>
      </div>
      <button onClick={()=>setLang(l=>l==='zh'?'en':'zh')} style={{padding:"4px 12px",borderRadius:6,border:"1px solid rgba(0,0,0,0.12)",background:"white",fontSize:12,fontWeight:600,cursor:"pointer",color:"#666"}}>{L==='zh'?'EN':'中文'}</button>
      <div style={{textAlign:"right"}}>
        <div style={{fontSize:12,fontWeight:600}}>{name}</div>
        <button onClick={()=>{setName('');setSt({});localStorage.removeItem('mcm-mod-name')}} style={{fontSize:10,color:"#aaa",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>{ui.switchUser[L]}</button>
      </div>
    </div>

    {/* Progress */}
    <div style={{padding:"12px 14px",borderRadius:10,background:"rgba(0,0,0,0.02)",marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
      <div style={{fontSize:28,fontWeight:700,color:totalDone===8?"#3a7d68":"#c05a30"}}>{totalDone}<span style={{fontSize:13,color:"#aaa"}}>/8</span></div>
      <div style={{flex:1}}>
        <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>
          {totalDone===8?ui.allDone[L]:totalDone===0?ui.start[L]:ui.doneCount(totalDone)[L]}
        </div>
        <div style={{display:"flex",gap:3}}>
          {modules.map(m=><div key={m.id} style={{flex:1,height:6,borderRadius:3,background:modDone(m)?"#3a7d68":isUnlocked(m,st,preview)?"rgba(192,90,48,0.2)":"rgba(0,0,0,0.06)"}}/>)}
        </div>
        <div style={{fontSize:10,color:"#aaa",marginTop:3}}>{ui.checksLabel[L]}：{checksDone}/{TOTAL}</div>
      </div>
    </div>

    {/* Module cards */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:20}}>
      {modules.map(m=>{
        const unlocked=isUnlocked(m,st,preview);const done=modDone(m);const active=openMod===m.id;
        const pct=m.checks.zh.length?Math.round(m.checks.zh.filter((_,i)=>st[`m${m.id}-${i}`]).length/m.checks.zh.length*100):0;
        return(
          <button key={m.id} onClick={()=>unlocked&&setOpenMod(m.id)}
            style={{padding:"10px 6px",borderRadius:10,border:active?`2px solid ${modColors[m.id-1]}`:"1px solid rgba(0,0,0,0.06)",background:done?"rgba(58,125,104,0.06)":active?`${modColors[m.id-1]}08`:"white",cursor:unlocked?"pointer":"default",opacity:unlocked?1:0.3,textAlign:"center",transition:"all 0.15s"}}>
            <div style={{fontSize:20}}>{unlocked?m.icon:"🔒"}</div>
            <div style={{fontSize:9.5,fontWeight:700,color:done?"#3a7d68":"#666",marginTop:2}}>M{m.id}</div>
            {done?<div style={{fontSize:9,color:"#3a7d68"}}>✅</div>:unlocked&&pct>0?<div style={{fontSize:9,color:"#c05a30"}}>{pct}%</div>:null}
          </button>
        );
      })}
    </div>

    {/* Active module */}
    {curMod&&isUnlocked(curMod,st,preview)&&(
      <div className="fade-in" style={{borderRadius:12,border:`1.5px solid ${modColors[curMod.id-1]}25`,overflow:"hidden"}}>
        <div style={{padding:"16px 18px",background:`${modColors[curMod.id-1]}08`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:11,fontWeight:700,color:modColors[curMod.id-1],letterSpacing:"0.06em"}}>MODULE {curMod.id} {ui.moduleOf[L]}</div>
            {curMod.id<8&&<div style={{fontSize:10,color:"#999"}}>{modDone(curMod)?ui.completedNextHint[L]:ui.incompleteHint[L]}</div>}
          </div>
          <div style={{fontSize:18,fontWeight:700,marginTop:4}}>{curMod.icon} {curMod.title[L]}</div>
          <div style={{fontSize:12.5,color:"#555",marginTop:8,padding:"8px 10px",background:"rgba(255,255,255,0.6)",borderRadius:6}}>{curMod.intro[L]}</div>
        </div>
        <div style={{padding:"16px 18px"}}>
          <div style={{fontSize:12.5,color:"#333",lineHeight:1.9,whiteSpace:"pre-wrap",background:"rgba(0,0,0,0.015)",padding:"12px 14px",borderRadius:8,marginBottom:16}}>{curMod.content[L]}</div>
          <div style={{fontSize:11,fontWeight:700,color:"#888",marginBottom:8}}>{ui.checklistTitle[L]}</div>
          {curMod.checks[L].map((item,i)=>{const k=`m${curMod.id}-${i}`;const dn=st[k];return(
            <label key={i} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"5px 0",cursor:"pointer",fontSize:12.5,color:dn?"#999":"#333"}}>
              <input type="checkbox" checked={!!dn} onChange={()=>chk(k)} style={{marginTop:2.5,accentColor:"#3a7d68",width:16,height:16,cursor:"pointer"}}/>
              <span style={{textDecoration:dn?"line-through":"none"}}>{item}</span>
            </label>
          );})}
          <div style={{marginTop:16,padding:"12px 14px",borderRadius:8,background:modDone(curMod)?"rgba(58,125,104,0.06)":"rgba(0,0,0,0.02)",border:`1px solid ${modDone(curMod)?"rgba(58,125,104,0.2)":"rgba(0,0,0,0.06)"}`}}>
            {modDone(curMod)?(<div>
              <div style={{fontSize:14,fontWeight:700,color:"#3a7d68",marginBottom:4}}>{ui.modComplete(curMod.id)[L]}{curMod.id<8?ui.nextUnlocked[L]:ui.allTrainingDone[L]}</div>
              <button onClick={()=>downloadRecord(name,curMod,st,L)} style={{width:"100%",padding:"10px",borderRadius:8,border:"none",background:"#3a7d68",color:"white",fontSize:13,fontWeight:600,cursor:"pointer",marginTop:6}}>{ui.downloadBtn[L]}</button>
              <div style={{fontSize:10.5,color:"#888",marginTop:6,textAlign:"center"}}>{ui.downloadHint[L]}</div>
              {curMod.id<8&&<button onClick={()=>setOpenMod(curMod.id+1)} style={{width:"100%",padding:"10px",borderRadius:8,border:"1px solid rgba(24,104,183,0.3)",background:"rgba(24,104,183,0.05)",color:"#1868b7",fontSize:13,fontWeight:600,cursor:"pointer",marginTop:8}}>{ui.goNext(curMod.id+1)[L]}</button>}
            </div>):(<div style={{fontSize:12,color:"#888"}}>{ui.pendingHint[L]}</div>)}
          </div>
        </div>
      </div>
    )}

    {curMod&&!isUnlocked(curMod,st,preview)&&(
      <div className="fade-in" style={{borderRadius:12,border:"1px solid rgba(0,0,0,0.06)",padding:"40px 20px",textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:8}}>🔒</div>
        <div style={{fontSize:14,fontWeight:600,color:"#666"}}>{ui.locked(curMod.id)[L]}</div>
        <div style={{fontSize:12,color:"#aaa",marginTop:4}}>{ui.lockedHint(curMod.id)[L]}</div>
        <button onClick={()=>setOpenMod(curMod.id-1)} style={{marginTop:12,padding:"8px 16px",borderRadius:8,border:"1px solid rgba(0,0,0,0.1)",background:"white",fontSize:12,fontWeight:600,cursor:"pointer",color:"#666"}}>{ui.goBack(curMod.id-1)[L]}</button>
      </div>
    )}

    <div style={{marginTop:24,padding:"10px 12px",borderRadius:8,background:"rgba(220,50,50,0.03)",border:"1px solid rgba(220,50,50,0.07)",fontSize:10.5,color:"#888",lineHeight:1.7}}>
      <span style={{fontWeight:700,color:"#b33"}}>{ui.privacyRedline[L]}</span> {ui.privacyText[L]}
    </div>

    <div style={{marginTop:8,padding:"14px 16px",borderRadius:10,background:"linear-gradient(135deg,rgba(24,104,183,0.06),rgba(58,125,104,0.06))",border:"1px solid rgba(24,104,183,0.12)",display:"flex",alignItems:"center",gap:12}}>
      <div style={{fontSize:28,lineHeight:1}}>💬</div>
      <div>
        <div style={{fontSize:13,fontWeight:700,color:"#1a1a1a"}}>{ui.helpTitle[L]}</div>
        <div style={{fontSize:12,color:"#555",marginTop:2}}>{ui.helpText[L]} <span style={{fontWeight:700,color:"#1868b7"}}>Wilson</span> {ui.helpSuffix[L]}</div>
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
